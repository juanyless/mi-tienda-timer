<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gran Tienda Digital</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        
        /* Contenedor Responsivo: se adapta a celular y PC */
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; border-radius: 12px; padding: 15px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .card:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .emoji { font-size: 3rem; margin-bottom: 10px; display: block; }
        h3 { font-size: 1rem; margin: 10px 0; color: #333; height: 40px; overflow: hidden; }
        .precio { color: #27ae60; font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 15px; }
        
        button { 
            background: #2563eb; color: white; border: none; width: 100%; 
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; 
        }
        button:active { background: #1d4ed8; }
    </style>
</head>
<body>

    <h1>🛍️ Mi Tienda Completa</h1>
    <div class="grid-productos" id="contenedor">
        </div>

    <script>
        const socket = io();

        // 1. LA LISTA DE PRODUCTOS (Podés llegar a 40 fácilmente)
        const misProductos = [
            { n: "Espresso", p: 150, e: "☕" },
            { n: "Medialuna", p: 100, e: "🥐" },
            { n: "Tostado", p: 350, e: "🥪" },
            { n: "Jugo Naranja", p: 200, e: "🍹" },
            { n: "Muffin Choco", p: 180, e: "🧁" },
            { n: "Té Verde", p: 120, e: "🍵" },
            { n: "Alfajor", p: 90, e: "🍪" },
            { n: "Sandwich J&Q", p: 400, e: "🥖" },
            
            // Agregá más aquí siguiendo el mismo formato...
        ];

        // Rellenar hasta llegar a 40 para probar (solo repito los anteriores)
        while(misProductos.length < 40) {
            misProductos.push({ n: "Producto Extra " + (misProductos.length + 1), p: 500, e: "🎁" });
        }

        // 2. DIBUJAR LOS PRODUCTOS EN LA PANTALLA
        const contenedor = document.getElementById('contenedor');
        
        misProductos.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="emoji">${prod.e}</span>
                <h3>${prod.n}</h3>
                <span class="precio">$${prod.p}</span>
                <button onclick="pedir('${prod.n}', ${prod.p})">AGREGAR</button>
            `;
            contenedor.appendChild(card);
        });

        function pedir(nombre, precio) {
            const pedido = {
                id: Math.floor(Math.random() * 999),
                producto: nombre,
                total: precio,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            socket.emit('enviar-pedido', pedido);
            console.log("Pedido enviado:", pedido);
        }
    </script>
</body>
</html>
