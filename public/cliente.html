<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Pedir Ahora</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #2c3e50; }
        .contenedor { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .producto-card { background: white; width: 200px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .producto-card:hover { transform: translateY(-5px); }
        .foto { width: 100%; height: 120px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .info { padding: 15px; }
        .precio { color: #27ae60; font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }
        button { background: #2563eb; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:active { background: #1d4ed8; }
        #status-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; display: none; }
    </style>
</head>
<body>
    <h1>☕ Mi Cafetería Premium</h1>
    <p>Tocá un producto para enviarme el pedido al instante.</p>

    <div class="contenedor">
        <div class="producto-card">
            <div class="foto">☕</div>
            <div class="info">
                <h3>Espresso</h3>
                <span class="precio">$150</span>
                <button onclick="enviarPedido('Espresso', 150)">PEDIR</button>
            </div>
        </div>

        <div class="producto-card">
            <div class="foto">🥛</div>
            <div class="info">
                <h3>Latte</h3>
                <span class="precio">$220</span>
                <button onclick="enviarPedido('Latte', 220)">PEDIR</button>
            </div>
        </div>

        <div class="producto-card">
            <div class="foto">🥐</div>
            <div class="info">
                <h3>Medialuna</h3>
                <span class="precio">$100</span>
                <button onclick="enviarPedido('Medialuna', 100)">PEDIR</button>
            </div>
        </div>

        </div>

    <div id="status-msg">🚀 Pedido enviado... ¡Preparando!</div>

    <script>
        const socket = io();

        function enviarPedido(nombre, precio) {
            const pedido = {
                id: Math.floor(Math.random() * 999),
                producto: nombre,
                total: precio,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            socket.emit('enviar-pedido', pedido);

            // Efecto visual de confirmación
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
