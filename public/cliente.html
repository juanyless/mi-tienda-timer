<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Realizar Pedido</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .card { background: white; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        button { background: #2563eb; color: white; border: none; padding: 20px 40px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>☕ Pedir mi Café</h1>
        <p>Presiona el botón para avisar al vendedor.</p>
        <button id="btnComprar">¡PEDIR AHORA!</button>
        <p id="mensaje"></p>
    </div>

    <script>
        // Conexión automática al servidor
        const socket = io(); 

        document.getElementById('btnComprar').onclick = () => {
            const pedido = {
                id: Math.floor(Math.random() * 9999),
                producto: "Café Premium",
                hora: new Date().toLocaleTimeString()
            };

            // Enviamos el pedido al servidor (index.js)
            socket.emit('enviar-pedido', pedido);
            
            document.getElementById('mensaje').innerText = "✅ ¡Pedido enviado!";
            setTimeout(() => document.getElementById('mensaje').innerText = "", 3000);
        };
    </script>
</body>
</html>
