<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Vendedor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; }
        #btnActivar { background: #e67e22; color: white; padding: 15px; text-align: center; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
        .pedido { background: #34495e; border-left: 5px solid #2ecc71; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="btnActivar">🔔 CLIC AQUÍ PARA ACTIVAR SONIDO</div>
    <h1>📥 Pedidos Recibidos</h1>
    <div id="lista"></div>

    <script>
        const socket = io();
        let sonidoOk = false;
        document.getElementById('btnActivar').onclick = function() {
            sonidoOk = true;
            this.style.display = 'none';
        };

        socket.on('notificar-vendedor', (datos) => {
            const lista = document.getElementById('lista');
            const div = document.createElement('div');
            div.className = 'pedido';
            div.innerHTML = `
                <div>
                    <strong>${datos.producto}</strong> (ID: #${datos.id})<br>
                    <small>${datos.hora}</small>
                </div>
                <div style="font-size: 1.2rem;">$${datos.total}</div>
            `;
            lista.prepend(div);
            if(sonidoOk) { tocarTimbre(); }
        });

        function tocarTimbre() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 800;
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
            osc.start(); osc.stop(ctx.currentTime + 1);
        }
    </script>
</body>
</html>
