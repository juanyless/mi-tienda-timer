<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Vendedor - Recepción</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 30px; }
        .pedido { background: #2d2d2d; border-left: 6px solid #22c55e; padding: 15px; margin: 10px 0; border-radius: 4px; }
        #btnActivar { background: #f59e0b; color: black; padding: 20px; text-align: center; cursor: pointer; font-weight: bold; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="btnActivar">🔊 CLIC AQUÍ PARA ACTIVAR EL TIMBRE</div>
    <h1>🔔 Pedidos Entrantes</h1>
    <div id="lista"></div>

    <script>
        const socket = io();
        let sonidoHabilitado = false;

        // El navegador necesita este clic para dejar sonar el timbre
        document.getElementById('btnActivar').onclick = function() {
            sonidoHabilitado = true;
            this.style.display = 'none';
        };

        // Escuchamos lo que el servidor nos reenvía
        socket.on('notificar-vendedor', (datos) => {
            const lista = document.getElementById('lista');
            const div = document.createElement('div');
            div.className = 'pedido';
            div.innerHTML = `<strong>NUEVO PEDIDO #${datos.id}</strong><br>Producto: ${datos.producto}<br><small>${datos.hora}</small>`;
            lista.prepend(div);

            if(sonidoHabilitado) {
                tocarTimbre();
            }
        });

        function tocarTimbre() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Nota aguda
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
    </script>
</body>
</html>
