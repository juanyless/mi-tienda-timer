                contenidoVisual = `<img src="${prod.img}" class="producto-foto" alt="${prod.n}">`;
            } else {
                // Si no tiene foto, usamos el emoji
                contenidoVisual = `<span class="emoji">${prod.e}</span>`;
            }
    
            card.innerHTML = `
                ${contenidoVisual}
                <h3>${prod.n}</h3>
                <span class="precio">$${prod.p.toLocaleString()}</span>
                <button onclick="pedir('${prod.n}', ${prod.p})">PEDIR</button>
            `;
            contenedor.appendChild(card);
        });
    
        function pedir(nombreProducto, precio) {
            const nombreCliente = document.getElementById('clienteNombre').value.trim();
    
            if (nombreCliente === "") {
                alert("⚠️ Por favor, dinos tu nombre para preparar el envío.");
                document.getElementById('clienteNombre').focus();
                return;
            }
    
            // Guardar nombre para la próxima vez
            localStorage.setItem('nombreCliente', nombreCliente);
    
            const pedido = {
                id: Math.floor(Math.random() * 9999),
                cliente: nombreCliente,
                producto: nombreProducto,
                total: precio,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            
            socket.emit('enviar-pedido', pedido);
    
            const mensajeWA = `¡Hola! Soy ${nombreCliente}. Acabo de pedir: ${nombreProducto} por $${precio}. ¿Me confirmas el envío?`;
            const miTelefono = "543424494674"; 
            const urlWhatsapp = `https://wa.me/${miTelefono}?text=${encodeURIComponent(mensajeWA)}`;
            
            document.getElementById('btnWhatsapp').href = urlWhatsapp;
    
            alert(`✅ ¡Pedido enviado!\n\nPuedes pagar ahora y luego enviarnos el comprobante por el botón de WhatsApp.`);
            window.open("https://link.mercadopago.com.ar/juanyless1969", "_blank");
        }
